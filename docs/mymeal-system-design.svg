<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="1300" viewBox="0 0 2000 1300">
  <defs>
    <style>
      .title { font: 700 36px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #4b5563; }
      .box-title { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .box-text { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
      .small-text { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #374151; }
      .lane-title { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .line { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 8 6; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="2000" height="1300" fill="#f8fafc"/>
  <text x="60" y="60" class="title">MyMeal - Complete Project System Design</text>
  <text x="60" y="92" class="subtitle">Client + API + Domain Services + Database + External Integrations + Core Flows</text>

  <!-- Lanes -->
  <rect x="40" y="130" width="380" height="1120" rx="16" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="60" y="170" class="lane-title">Actors & Clients</text>

  <rect x="450" y="130" width="640" height="1120" rx="16" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="470" y="170" class="lane-title">Frontend (React + Vite)</text>

  <rect x="1120" y="130" width="540" height="1120" rx="16" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="1140" y="170" class="lane-title">Backend (AdonisJS API)</text>

  <rect x="1690" y="130" width="270" height="1120" rx="16" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
  <text x="1710" y="170" class="lane-title">Data & External</text>

  <!-- Actors -->
  <rect x="70" y="220" width="320" height="100" rx="12" fill="#ffffff" stroke="#0891b2" stroke-width="2"/>
  <text x="90" y="255" class="box-title">Consumers</text>
  <text x="90" y="282" class="box-text">Browse cooks, subscribe, pay, track orders</text>

  <rect x="70" y="350" width="320" height="100" rx="12" fill="#ffffff" stroke="#0891b2" stroke-width="2"/>
  <text x="90" y="385" class="box-title">Cooks</text>
  <text x="90" y="412" class="box-text">Manage profiles, meal plans, order status</text>

  <!-- Frontend -->
  <rect x="490" y="220" width="560" height="130" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="510" y="255" class="box-title">Routing & Layouts</text>
  <text x="510" y="282" class="box-text">PublicLayout, ConsumerLayout, CookLayout</text>
  <text x="510" y="306" class="small-text">Routes: Home, Discover, Cooks, Subscribe, Orders, Profile, Settings, Auth</text>

  <rect x="490" y="380" width="560" height="115" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="510" y="415" class="box-title">State & Data Access</text>
  <text x="510" y="442" class="box-text">Zustand stores (auth, toast) + React Query cache</text>
  <text x="510" y="466" class="small-text">Axios API client + service modules</text>

  <rect x="490" y="525" width="560" height="180" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="510" y="560" class="box-title">Frontend Service Layer</text>
  <text x="510" y="587" class="box-text">authService, discoverService, mealService, orderService, subscriptionService</text>
  <text x="510" y="614" class="small-text">Calls versioned endpoints under /api/v1</text>
  <text x="510" y="638" class="small-text">Handles auth tokens/session and normalized API responses</text>
  <text x="510" y="662" class="small-text">Drives role-specific UI for consumer/cook workflows</text>

  <!-- Backend -->
  <rect x="1160" y="220" width="460" height="120" rx="12" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
  <text x="1180" y="255" class="box-title">API Gateway / Routes</text>
  <text x="1180" y="282" class="box-text">/api/v1 auth, account, discover, cook-profiles, meal-plans,</text>
  <text x="1180" y="306" class="box-text">subscriptions, orders, payments, reviews</text>

  <rect x="1160" y="365" width="460" height="110" rx="12" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
  <text x="1180" y="400" class="box-title">Middleware & Security</text>
  <text x="1180" y="427" class="box-text">Auth middleware, role middleware, force JSON response</text>
  <text x="1180" y="451" class="small-text">Guardrails for consumer/cook authorization boundaries</text>

  <rect x="1160" y="500" width="460" height="120" rx="12" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
  <text x="1180" y="535" class="box-title">Controllers + Validators</text>
  <text x="1180" y="562" class="box-text">Auth, Profile, Discover, MealPlans, Subscriptions, Orders,</text>
  <text x="1180" y="586" class="box-text">OrderNotes, Payments, Reviews</text>

  <rect x="1160" y="645" width="460" height="200" rx="12" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
  <text x="1180" y="680" class="box-title">Domain Services</text>
  <text x="1180" y="707" class="box-text">OrderService:</text>
  <text x="1290" y="707" class="small-text">schedule generation, pause/resume sync, auto-missed</text>
  <text x="1180" y="732" class="box-text">PaymentService:</text>
  <text x="1295" y="732" class="small-text">payment ledger, wallet updates, payouts, transactions</text>
  <text x="1180" y="757" class="box-text">NotificationService:</text>
  <text x="1325" y="757" class="small-text">payment/order-note/earnings alerts</text>
  <text x="1180" y="782" class="box-text">CloudinaryService + WhatsAppService integrations</text>
  <text x="1180" y="807" class="small-text">Lucid ORM models and transaction boundaries for consistency</text>

  <rect x="1160" y="870" width="460" height="190" rx="12" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
  <text x="1180" y="905" class="box-title">Core Domain Models</text>
  <text x="1180" y="932" class="box-text">User, CookProfile, MealPlan, MealComponent, PickupSlot</text>
  <text x="1180" y="956" class="box-text">Subscription, SubscribedMealComponent, Order, OrderNote</text>
  <text x="1180" y="980" class="box-text">Payment, Review</text>
  <text x="1180" y="1004" class="small-text">Relations + preload patterns across consumer/cook workflows</text>

  <!-- Data / external -->
  <rect x="1715" y="230" width="220" height="130" rx="12" fill="#ffffff" stroke="#ca8a04" stroke-width="2"/>
  <text x="1735" y="265" class="box-title">Primary Database</text>
  <text x="1735" y="292" class="box-text">SQLite (default)</text>
  <text x="1735" y="316" class="box-text">PostgreSQL (supported)</text>
  <text x="1735" y="340" class="small-text">Migrations + Lucid schema</text>

  <rect x="1715" y="395" width="220" height="130" rx="12" fill="#ffffff" stroke="#ca8a04" stroke-width="2"/>
  <text x="1735" y="430" class="box-title">Cloudinary</text>
  <text x="1735" y="457" class="box-text">Profile/meal image upload</text>
  <text x="1735" y="481" class="small-text">Simulated fallback in dev</text>

  <rect x="1715" y="560" width="220" height="130" rx="12" fill="#ffffff" stroke="#ca8a04" stroke-width="2"/>
  <text x="1735" y="595" class="box-title">WhatsApp Web</text>
  <text x="1735" y="622" class="box-text">Event notifications</text>
  <text x="1735" y="646" class="small-text">QR auth + LocalAuth session</text>

  <rect x="1715" y="725" width="220" height="170" rx="12" fill="#ffffff" stroke="#ca8a04" stroke-width="2"/>
  <text x="1735" y="760" class="box-title">Business Outcomes</text>
  <text x="1735" y="787" class="box-text">Order ledger</text>
  <text x="1735" y="811" class="box-text">Subscription balance</text>
  <text x="1735" y="835" class="box-text">Cook wallet</text>
  <text x="1735" y="859" class="box-text">Consumer notifications</text>

  <!-- Flows -->
  <path class="line" d="M390 270 L490 270"/>
  <path class="line" d="M390 400 L490 270"/>
  <path class="line" d="M1050 585 L1160 280"/>
  <path class="line" d="M1050 585 L1160 420"/>
  <path class="line" d="M1050 585 L1160 560"/>
  <path class="line" d="M1050 585 L1160 740"/>

  <path class="line" d="M1620 740 L1715 295"/>
  <path class="line" d="M1620 740 L1715 460"/>
  <path class="line" d="M1620 740 L1715 625"/>
  <path class="line" d="M1620 965 L1715 810"/>

  <path class="line dashed" d="M1935 625 L1160 760"/>
  <path class="line dashed" d="M1935 460 L1160 760"/>

  <!-- Legend -->
  <rect x="70" y="1070" width="1550" height="150" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="90" y="1110" class="box-title">Core End-to-End Flow</text>
  <text x="90" y="1140" class="box-text">1) User interacts with React UI -> 2) Frontend services call AdonisJS API -> 3) Middleware enforces auth/role</text>
  <text x="90" y="1165" class="box-text">4) Controllers invoke domain services/models -> 5) DB updates are committed transactionally -> 6) Notifications/integrations fire</text>
  <text x="90" y="1190" class="small-text">Dashed arrows represent callback/event-style communication from external systems.</text>
</svg>
